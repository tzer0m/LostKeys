name: Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stop service
        run: sudo systemctl stop LostKeys.service
      - name: Publish
        run: dotnet publish LostKeys/LostKeys.csproj -c Release -o /home/tzer0m/Services/LostKeys
      - name: Start service
        run: sudo systemctl start LostKeys.service
      - name: Check status
        run: sudo systemctl status LostKeys.service --no-pager
